{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TrabahoPH</title>
    <link href="{% static 'css/style.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'css/admin.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif !important;
        }

        i, .bi {
            font-family: 'bootstrap-icons' !important;
        }

        :root {
            --green-50: #f0fdf4;
            --green-100: #dcfce7;
            --green-200: #bbf7d0;
            --green-300: #86efac;
            --green-400: #4ade80;
            --green-500: #22c55e;
            --green-600: #16a34a;
            --green-700: #15803d;
            --green-800: #166534;
            --green-900: #14532d;
        }

        /* Green Admin Header */
        .navbar {
            background: var(--green-700) !important;
            color: white !important;
            border-bottom: 2px solid var(--green-800) !important;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.15);
        }

        .navbar .logo {
            color: white !important;
            background: none !important;
            -webkit-text-fill-color: unset !important;
        }

        .navbar .tagline {
            color: rgba(255, 255, 255, 0.9) !important;
        }

        .navbar .btn-secondary {
            background: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            padding: 12px 24px !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            border-radius: 8px !important;
            line-height: 1.4 !important;
            height: 44px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .navbar .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
        }

        /* Green Sidebar */
        .admin-sidebar {
            background: linear-gradient(to bottom, var(--green-50), var(--green-100)) !important;
            border-right: 2px solid var(--green-200) !important;
        }

        .admin-nav-link {
            color: var(--green-800) !important;
            border-left: 3px solid transparent !important;
            transition: all 0.3s ease !important;
        }

        .admin-nav-link:hover {
            background: rgba(22, 163, 74, 0.1) !important;
            color: var(--green-700) !important;
            border-left-color: var(--green-500) !important;
        }

        .admin-nav-link.active {
            background: rgba(22, 163, 74, 0.15) !important;
            color: var(--green-700) !important;
            border-left-color: var(--green-600) !important;
            font-weight: 600 !important;
        }

        /* Sticky Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1001;
        }

        /* Admin Navbar Compact */
        .navbar {
            padding: 0.75rem 0 !important;
        }

        .navbar .tagline {
            display: none !important;
        }

        .nav-container {
            padding: 0 20px !important;
        }

        /* Nav Buttons Container */
        .nav-buttons {
            display: flex !important;
            gap: 10px !important;
            align-items: center !important;
        }

        /* Logout Form Button */
        .nav-buttons form {
            display: inline-flex !important;
            align-items: center !important;
            margin: 0 !important;
            vertical-align: middle !important;
        }

        .nav-buttons form button {
            background: rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            padding: 12px 24px !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            font-family: 'Poppins', sans-serif !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            transition: all 0.3s ease !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            line-height: 1.4 !important;
            height: 44px !important;
            min-width: 114px !important;
        }

        .nav-buttons form button:hover {
            background: rgba(255, 255, 255, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="logo">🇵🇭 TrabahoPH Admin</h1>
                <p class="tagline">Administration Dashboard</p>
                <div class="nav-buttons">
                    <a href="{% url 'index' %}" class="btn btn-secondary">Back to Site</a>
                    <form method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-secondary">Logout</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main class="admin-main">
        <div class="admin-container">
            <aside class="admin-sidebar">
                <nav class="admin-nav">
                    <a href="{% url 'admin_dashboard' %}" class="admin-nav-link {% if page == 'dashboard' %}active{% endif %}">
                        <i class="bi bi-graph-up"></i> Dashboard
                    </a>
                    <a href="{% url 'manage_jobs' %}" class="admin-nav-link {% if page == 'manage_jobs' %}active{% endif %}">
                        <i class="bi bi-briefcase"></i> Manage Jobs
                    </a>
                    <a href="{% url 'manage_applications' %}" class="admin-nav-link {% if page == 'manage_applications' %}active{% endif %}">
                        <i class="bi bi-envelope-open"></i> Applications
                    </a>
                    <a href="{% url 'manage_users' %}" class="admin-nav-link {% if page == 'manage_users' %}active{% endif %}">
                        <i class="bi bi-people-fill"></i> Users
                    </a>
                    <a href="{% url 'admin:index' %}" class="admin-nav-link">
                        <i class="bi bi-sliders"></i> Django Admin
                    </a>
                </nav>
            </aside>

            <div class="admin-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>
</body>
</html>
